project:
  name: "macro_forecasting_dashboard"
  random_seed: 42
  strict_required_variables: true

data:
  start_date: "2000-01-01"
  end_date: "2025-12-31"

  raw_urls:
    inflation: "https://www.rba.gov.au/statistics/tables/xls/g01hist.xlsx"
    cash_rate: "https://www.rba.gov.au/statistics/tables/xls/f01hist.xlsx"
    output: "https://www.abs.gov.au/statistics/economy/national-accounts/australian-national-accounts-national-income-expenditure-and-product/dec-2025/5206002_Expenditure_Volume_Measures.xlsx"
    unemployment: "https://www.abs.gov.au/statistics/labour/employment-and-unemployment/labour-force-australia/latest-release/6202001.xlsx"
    wages: "https://www.abs.gov.au/statistics/economy/price-indexes-and-inflation/wage-price-index-australia/dec-2025/634501.xlsx"

  variables:
    inflation:
      display_name: "Underlying Inflation"
      target_type: "growth"
      raw_frequency: "quarterly"
      quarterly_method: "as_is"

    cash_rate:
      display_name: "Cash Rate"
      target_type: "level"
      raw_frequency: "monthly"
      quarterly_method: "mean"

    output:
      display_name: "Real Non-farm Output Growth"
      target_type: "growth"
      raw_frequency: "quarterly"
      quarterly_method: "as_is"

    unemployment:
      display_name: "Unemployment Rate"
      target_type: "level"
      raw_frequency: "monthly"
      quarterly_method: "mean"

    wages:
      display_name: "Wages Growth"
      target_type: "growth"
      raw_frequency: "quarterly"
      quarterly_method: "as_is"

forecast:
  horizons: [1, 4]
  strategy: "rolling"   # rolling or recursive
  train_ratio: 0.8
  min_train_periods: 40

models:
  enabled:
    - naive
    - mean
    - ar
    - var
    - bvar
    - factor

  ar:
    max_lag: 4

  var:
    max_lag: 4

  bvar:
    max_lag: 4
    lambda_1: 0.2
    lambda_2: 0.5
    lambda_3: 1.0

  factor:
    n_factors: 2
    max_lag: 4

evaluation:
  metrics:
    - bias
    - rmse
    - mae

covid:
  enabled: true
  start: "2020-03-01"
  end: "2021-12-31"
  robustness:
    full_sample: true
    exclude_covid: true
    use_dummy: true

dashboard:
  default_variable: "inflation"
  default_horizon: 1
  default_metric: "rmse"